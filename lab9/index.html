<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript em ação</title>
</head>
<body>
    <div>
        <a href="home.html">voltar</a>
    </div>

    <main>
        <section id="ex1">
            <p>1.Passa por aqui!</p>
        </section>

        <section id="ex2">
            <p>2.Pinta-me!</p>
            <button data-color="red">Red</button>
            <button data-color="green">Green</button>
            <button data-color="blue">Blue</button>
        </section>

        <section id="ex3">
            <p>3.Experimenra escrever...</p>
            <input type="text">
        </section>

        <section id="ex4">
            <div id="ex4o1">
                <p>4.1.Escolha uma cor em inglês:</p>
                <input type="text">
                <button>submeter</button>
            </div>
            <div id="ex4o2">
                <p>4.2.Escolha uma cor:</p>
                <select>
                    <option value="white">White</option>
                    <option value="red">Red</option>
                    <option value="green">Green</option>
                    <option value="blue">Blue</option>
                </select>
            </div>
        </section>

        <section id="ex5">
            <span>5.</span>
            <button>Conta!</button>
            <span>0</span>
        </section>

        <section id="ex6">
            <form>
                <p>6.</p>
                <input type="text">
                <input type="number">
                <button>submeter</button>
            </form>
            <p id="mostra-texto"></p>
        </section>

        <section id="ex7">
            <p>7.Automatic Counter: <span>0</span></p>
        </section>
    </main>

    <script src="scripts/main.js"></script>
</body>
</html>
