<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/viagem.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <title>Sua viagem a Quioto</title>
</head>
<body>
    <header>
        <a href="index.html"><span class="material-symbols-outlined">home</span> Voltar</a>

        <section>
            <div>
                <span class="material-symbols-outlined">spa</span>
                <span class="material-symbols-outlined">spa</span>
                <span class="material-symbols-outlined">spa</span>
            </div>
            <h1>Quioto</h1>
            <div>
                <span class="material-symbols-outlined">spa</span>
                <span class="material-symbols-outlined">spa</span>
                <span class="material-symbols-outlined">spa</span>
            </div>
        </section>
    </header>

    <main>
        <h2>Formulário para sua Viagem</h2>

        <form id="viagem-form" action="https://postman-echo.com/get" method="get">
            <fieldset class="form-identificacao">
                <legend>Identificação</legend>
                
                <div>
                    <div>
                        <label for="nome">Nome</label>
                        <input type="text" name="nome" id="nome" placeholder="Escreva seu nome" maxlength="15" autocomplete="on" autofocus required aria-describedby="Escrever seu nome">
                    </div>
                    <div>
                        <label for="apelido">Apelido</label>
                        <input type="text" name="apelido" id="apelido" placeholder="Escreva seu apelido" maxlength="15" autocomplete="on" required aria-describedby="Escrever seu apelido">
                    </div>
                    <div>
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email" placeholder="Escreva seu e-mail" maxlength="25" autocomplete="on" required aria-describedby="Escrever seu email">
                    </div>
                </div>
                <img src="images/viagem/undraw_mobile_login_re_9ntv.svg" alt="">
            </fieldset>
            
            <fieldset class="form-dados">
                <legend>Dados importantes</legend>

                <div class="datas">    
                    <div>
                        <label for="data-partida">Data de partida</label>
                        <input type="date" name="data-partida" id="data-partida" required>
                    </div>
                
                    <div>
                        <label for="data-regresso">Data de regresso</label>
                        <input type="date" name="data-regresso" id="data-regresso" required>
                    </div>
                </div>

                <div class="numero-passageiros">
                    <label for="num-passageiros">Números de passageiros</label>
                    <input type="number" name="num-passageiros
                    " id="num-passageiros" min="1" max="9" value="1" required>
                </div>

                <div class="transportes">
                    <label for="transporte">Meio de transporte favorito (preço p.p.)</label>
                    <select name="transporte" id="transporte" required>
                        <option value="vazio" disabled selected>- - - - - - -</option>
                        <option value="aviao">Avião - 2.572 €</option>
                        <option value="nadando">A nado - 0 €</option>
                        <option value="navio">Navio - 800 €</option>
                        <option value="tapete-aladdin">Tapete do Aladdin - 500 € (cuidado com o vento!)</option>
                        <option value="foguete">Foguete do Elon Musk - 10.000 € + conta do Twitter</option>
                        <option value="batmovel">BatMovel Subaquático - 1.200 € (opção de passeio com Robin)</option>
                        <option value="dragao">Dragão Verde Voador - 6 esferas do dragão</option>
                        <option value="carruagem">Carruagem Puxada por Unicórnios - 1.000 €</option>
                        <option value="bicicleta-hp">Bicicleta invisível do Harry Potter - Pedra Filosofal</option>
                        <option value="de-lorean">Máquina do tempo do DeLorean - 3.000 €</option>
                        <option value="caminhao-sorvete">Caminhão de sorvete encantado - 250 € + gelado grátis</option>
                        <option value="teletransporte-st">Teletransporte da Star Trek - 2.000 €</option>
                        <option value="capitao-nemo">Submarino do Capitão Nemo - 1.800 €</option>
                        <option value="burro-shrek">Nas costas do Burro do Shrek - fazer o Urro</option>
                        <option value="camelo">Um camelo do Egito - 150 € (com direito a selfie)</option>
                        <option value="pterodáctilo">Pterodáctilo com a asa quebrada - 400 €</option>
                    </select>
                </div>

                <div class="servico-viagem">                    
                    <p>Qual serviço deseja na sua viagem</p>

                    <div>
                        <input type="radio" name="servico" id="basico" value="basico" required>
                        <label for="basico">Básico</label>

                        <input type="radio" name="servico" id="premium" value="premium" required>
                        <label for="premium">Premium</label>
                    </div>
                </div>

                <div class="caixa-texto-pedidos">
                    <label for="pedidos-especiais">Tem algum(ns) pedido(s) especial(is) </label>
                    <textarea name="pedidos-especiais" id="pedidos-especiais" maxlength="150" rows="4" cols="50" required placeholder="Escreva aqui algum pedido especial..." aria-describedby="Campo de texto para escrever alguns pedidos especiais para a viagem."></textarea>
                </div>

                <div class="gastar-por-pessoa">  
                    <label for="valor-gastar-pp">Qual o valor que espera gastar por pessoa na sua viagem</label>
                    <input type="number" name="valor-gastar-pp" id="valor-gastar-pp" min="0" max="50000"  step="100" value="0" required>€
                </div>

                <div class="gastar-por-dia">                    
                    <label for="valor-gastar-dia">E um valor aceitável para gastar diariamente</label>
                    <input type="number" name="valor-gastar-dia" id="valor-gastar-dia" min="0" max="5000" step="50" value="0" required>€
                </div>
            </fieldset>
        </form>

        <article class="botoes">
            <button class="enviar" type="submit" form="viagem-form">Enviar</button>
            <button class="reiniciar" type="reset" form="viagem-form">Reiniciar</button>
        </article>
    </main>

    <footer>
        <img src="../lab1/images/ulht.png" alt="Logo da Universidade Lusófona">
        <p>
            DIW 2024
        </p>
        <p>
            Acesse o meu <a href="https://github.com/giuseppe-mazzeo/" target="_blank" rel="external">GitHub</a>
        </p>
    </footer>
</body>
